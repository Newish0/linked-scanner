name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x86_64
          - os: macos-14
            arch: arm64
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - run: pnpm install --frozen-lockfile

      - name: build Tauri
        run: pnpm --filter receiver tauri build

      - name: upload bundles
        uses: actions/upload-artifact@v7
        with:
          name: receiver-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            receiver/src-tauri/target/release/bundle/**/*.deb
            receiver/src-tauri/target/release/bundle/**/*.rpm
            receiver/src-tauri/target/release/bundle/**/*.AppImage
            receiver/src-tauri/target/release/bundle/**/*.dmg
            receiver/src-tauri/target/release/bundle/**/*.msi
            receiver/src-tauri/target/release/bundle/**/*.exe

  build-pwa:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: build scanner PWA
        run: pnpm --filter scanner build
        env:
          VITE_BASE_PATH: /linked-scanner/scanner/

      - name: prepare pages artifact
        run: |
          mkdir -p _site/scanner
          cp -r scanner/dist/* _site/scanner/
          cp -r landing/* _site/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          name: github-pages

      - uses: actions/upload-artifact@v7
        with:
          name: scanner-pwa
          path: scanner/dist

  create-release:
    needs: [build-tauri, build-pwa]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8

      - name: draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            receiver-*/**/*.deb
            receiver-*/**/*.rpm
            receiver-*/**/*.AppImage
            receiver-*/**/*.dmg
            receiver-*/**/*.msi
            receiver-*/**/*.exe

  deploy-pages:
    needs: build-pwa
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
